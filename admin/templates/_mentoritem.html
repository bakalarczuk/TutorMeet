<div class="card">
    <div class="card-body">
        <div class="row">
            <div class="col-lg-3">
                <div class="text">
                    <h3 class="name">{realname}</h3>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="form-group">
                    <label>{email}</label>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="form-group">
                    <label>{applcnts}</label>
                </div>
            </div>
            <div class="col-lg-1">
                <div class="form-group">
                    <button type="button" class="btn btn-success au-input--full" id="btn-submit"
                            {open}>{btnText}</button>
                </div>
            </div>
        </div>
        <div class="row" id="more-{idname}" style="margin-top: 20px;display: none;">
            <form method="post" id="form-more-{idname}">
                <div class="form-group">
                    <div class="row">
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Email</label>
                                <input class="au-input au-input--full" type="text" name="email" value="{email}">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Phone</label>
                                <input class="au-input au-input--full" type="text" name="phone" value="{phone}">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Rate</label>
                                <input class="au-input au-input--full" type="text" name="rate" value="{rate}">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Currency</label>
                                <select class="au-input--full au-select" name="currency">
                                    <option value="PLN" {selectpl}>PLN</option>
                                    <option value="EUR" {selecteu}>EUR</option>
                                    <option value="GBP" {selectgb}>GBP</option>
                                    <option value="USD" {selectud}>USD</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-2">
                            <div class="form-group">
                                <label>IBAN</label>
                                <input class="au-input au-input--full" type="text" name="iban" value="{iban}">
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="form-group">
                                <label>SWIFT</label>
                                <input class="au-input au-input--full" type="text" name="swift" value="{swift}">
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="form-group">
                                <label>Bank Name</label>
                                <input class="au-input au-input--full" type="text" name="bankname" value="{bankname}">
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="form-group">
                                <label>Account no</label>
                                <input class="au-input au-input--full" type="text" name="accountno" value="{accountno}">
                                <input type="hidden" name="userid" value="{userid}">
                                <input type="hidden" name="mentorid" value="{mentorid}">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Street</label>
                                <input class="au-input au-input--full" type="text" name="street" placeholder="Street"
                                       value="{street}">
                            </div>
                        </div>
                        <div class=" col-lg-3">
                            <div class="form-group">
                                <label>Street No</label>
                                <input class="au-input au-input--full" type="text" name="streetno" value="{streetno}"
                                       placeholder=" Street No">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Local No</label>
                                <input class="au-input au-input--full" type="text" name="localno" value="{localno}"
                                       placeholder=" Local No">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input class="au-input au-input--full" type="text" name="postalcode"
                                       value="{postalcode}" placeholder=" Postal Code">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Town</label>
                                <input class="au-input au-input--full" type="text" name="town" placeholder="Town"
                                       value="{town}">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Contract</label>
                                <select class="au-input--full au-select" name="contract">
                                    <option value="0" {selectedn}>Normal</option>
                                    <option value="1" {selectedl}>Letter of understading</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="form-group">
                                <label>Note</label>
                                <textarea class="au-input au-input--full" name="note">{note}</textarea>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="form-group">
                                <label>Bio</label>
                                <textarea class="au-input au-input--full" name="bio">{bio}</textarea>
                            </div>
                        </div>
                        <div class=" col-lg-12">
                            <div class="form-group">
                                <label></label>
                                <button type="button" class="btn btn-success au-input--full" id="btn-submit"
                                        onclick="SubmitMentor('#form-more-{idname}');">Update</button>
                            </div>                   
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
