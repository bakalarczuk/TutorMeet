<div class="card">
    <div class="card-body">
        <div class="row">
            <div class="col-lg-3">
                <div class="text">
                    <h3 class="name">{realname}</h3>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="form-group">
                    <label>{email}</label>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="form-group">
                    <label>{mentors}</label>
                </div>
            </div>
            <div class="col-lg-1">
                <div class="form-group">
                    <button type="button" class="btn btn-success au-input--full" id="btn-submit"
                        {open}>{btnText}</button>
                </div>
            </div>
        </div>
        <div class="row" id="more-{idname}" style="margin-top: 20px;display: none;">
            <div class="form-group">
                <form method="post" id="form-more-{idname}" class="invoice-form">
                    <div class="row">
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Email</label>
                                <input class="au-input au-input--full" type="text" name="email" value="{email}">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Street</label>
                                <input class="au-input au-input--full" type="text" name="street" placeholder="Street"
                                    value="{street}">
                                <input type="hidden" name="userid" value="{userid}">
                                <input type="hidden" name="mentorid" value="{mentorid}">
                            </div>
                        </div>
                        <div class=" col-lg-3">
                            <div class="form-group">
                                <label>Street No</label>
                                <input class="au-input au-input--full" type="text" name="streetno" value="{streetno}"
                                    placeholder=" Street No">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Local No</label>
                                <input class="au-input au-input--full" type="text" name="localno" value="{localno}"
                                    placeholder=" Local No">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input class="au-input au-input--full" type="text" name="postalcode"
                                    value="{postalcode}" placeholder=" Postal Code">
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="form-group">
                                <label>Town</label>
                                <input class="au-input au-input--full" type="text" name="town" placeholder="Town"
                                    value="{town}">
                            </div>
                        </div>
                        <div class="col-lg-3">
                            <div class="form-group">
                                <label>Contract</label>
                                <select class="au-input--full au-select" name="type">
                                    <option value="">Select</option>
                                    <option value="0" {selected0}>Agency</option>
                                    <option value="1" {selected1}>Premium</option>
                                </select>
                            </div>
                        </div>
                        <div class=" col-lg-12">
                            <div class="form-group">
                                <label></label>
                                <button type="button" class="btn btn-success au-input--full" id="btn-submit"
                                    onclick="SubmitAplicant('#form-more-{idname}');">Update</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
