
<div class="">
    <div class="login-content">

        <div id="error">
        </div>
        <div class="login-form">
            <form method="post" id="register-form">
                <div class="row">
                    <div class="col-lg-6">
                        <div class="form-group">
                            <label>Name</label>
                            <input class="au-input au-input--full" type="text" name="name" placeholder="Name">
                        </div>
                        <div class="form-group">
                            <label>Last name</label>
                            <input class="au-input au-input--full" type="text" name="lastname" placeholder="Last name">
                        </div>
                    </div>
                    <div class="col-lg-6 ">
                        <div class="form-group">
                            <label>Email/Username</label>
                            <input class="au-input au-input--full" type="email" name="email" placeholder="Email/Username">
                        </div>
                        <div class="form-group">
                            <input type="hidden" name="password" value="{pwd}">
                        </div>
                        <div class="form-group">
                            <label>Permissions</label>
                            {options}
                        </div>
                    </div>
                </div>
                <div class="row" id="userDataContent">

                </div>
                <button class="au-btn au-btn--block au-btn--green m-b-20" type="submit">register</button>

            </form>
        </div>
    </div>
</div>
