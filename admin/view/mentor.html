<div class="col-lg-6">
    <div class="row">
        <div class="col-lg-6">
            <div class="form-group">
                <label>IBAN</label>
                <input class="au-input au-input--full" type="text" name="iban" placeholder="IBAN">
            </div>
        </div>
        <div class="col-lg-6">
            <div class="form-group">
                <label>SWIFT</label>
                <input class="au-input au-input--full" type="text" name="swift" placeholder="SWIFT">
            </div>
        </div>
    </div>
    <div class="form-group">
        <label>Street</label>
        <input class="au-input au-input--full" type="text" name="street" placeholder="Street">
    </div>
    <div class="row">
        <div class="col-lg-6">
            <div class="form-group">
                <label>Street No</label>
                <input class="au-input au-input--full" type="text" name="streetno" placeholder="Street No">
            </div>
        </div>
        <div class="col-lg-6">
            <div class="form-group">
                <label>Local No</label>
                <input class="au-input au-input--full" type="text" name="localno" placeholder="Local No">
            </div>
        </div>
        <div class="col-lg-3">
            <div class="form-group">
                <label>Postal Code</label>
                <input class="au-input au-input--full" type="text" name="postalcode" placeholder="Postal Code">
            </div>
        </div>
        <div class="col-lg-9">
            <div class="form-group">
                <label>Town</label>
                <input class="au-input au-input--full" type="text" name="town" placeholder="Town">
            </div>
        </div>
        <div class="col-lg-3">
            <div class="form-group">
                <label>Hour Rate</label>
                <input class="au-input au-input--full" type="text" name="rate" placeholder="Hour Rate">
            </div>
        </div>
        <div class="col-lg-3">
            <div class="form-group">
                <label>Workshop</label>
                <input class="au-input au-input--full" type="text" name="daily" placeholder="Workshop Rate">
            </div>
        </div>
        <div class="col-lg-6">
            <div class="form-group">
                <label>Contract</label>
                <select class="au-input--full au-select" name="contract">
                    <option value="">Select</option>
                    <option value="0">Zlecenie</option>
                    <option value="1">Letter of understanding</option>
                    <option value="2">B2B</option>
                </select>
            </div>
        </div>
    </div>
</div>
<div class="col-lg-6 ">
    <div class="row">
        <div class="col-lg-12">
            <div class="form-group">
                <label>Bank Name</label>
                <input class="au-input au-input--full" type="text" name="bankname" placeholder="Bank Name">
            </div>
        </div>
    </div>
    <div class="form-group">
        <label>Bank Account No</label>
        <input class="au-input au-input--full" type="text" name="account" placeholder="Bank Account No">
    </div>
    <div class="form-group">
        <label>Currency</label>
        <select class="au-input--full au-select" name="currency">
            <option value="PLN">PLN</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="USD">USD</option>
        </select>
    </div>
    <div class="form-group">
        <label>Phone</label>
        <input class="au-input au-input--full" type="text" name="phone" placeholder="Phone No">
    </div>
    <div class="form-group">
        <label>Note</label>
        <textarea class="form-control" name="note" rows="5"></textarea>
    </div>
</div>
