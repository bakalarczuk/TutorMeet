<div class="">
    <div class="message-content">
        <div id="error">
        </div>
        <div class="message-form">
            <form method="post" enctype="multipart/form-data" id="message-form">
                <input type="hidden" id="sender" name="sender" value="{sender}" />

                <div class="col-lg-12">
                    <div class="form-group">
                        <label>Subject</label>
                        <input class="au-input au-input--full" type="text" id="subject" name="subject" placeholder="Subject">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-control" id="message" name="message" rows="10"></textarea>
                    </div>
                    <div class=form-group">
                        <label>Recipient</label>
                        {recipient}
                    </div>
                    <div class=form-group">
                        <label>Attach file</label><br/>
    <input id="uploadFile" name="fileToUpload" type="file" />
                    </div>
                </div>
                <div style="height:40px;">
                </div>
                <button class="au-btn au-btn--block au-btn--green m-b-20" id="btn-submit" type="submit">send</button>

            </form>
        </div>
    </div>
</div>
